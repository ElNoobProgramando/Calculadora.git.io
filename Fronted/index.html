<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Carrito de Compras</title>
</head>
<body>
  <h1>Carrito de Compras</h1>
  
  <input type="text" id="nombre" placeholder="Nombre del producto">
  <input type="number" id="precio" placeholder="Precio">
  <button onclick="agregarAlCarrito()">Agregar</button>
  <button onclick="guardarCarrito()">Guardar Carrito</button>
  <button onclick="cargarProductos()">Cargar Todos</button>

  <h2>Carrito:</h2>
  <ul id="carrito"></ul>

  <h2>Productos en la Base de Datos:</h2>
  <ul id="productos"></ul>

  <script>
    let carrito = [];

    function agregarAlCarrito() {
      const nombre = document.getElementById("nombre").value;
      const precio = parseFloat(document.getElementById("precio").value);

      if (!nombre || isNaN(precio)) return alert("Completa bien los campos");

      carrito.push({ nombre, precio });
      mostrarCarrito();
    }

    function mostrarCarrito() {
      const lista = document.getElementById("carrito");
      lista.innerHTML = "";
      carrito.forEach(p => {
        const li = document.createElement("li");
        li.textContent = `${p.nombre} - $${p.precio}`;
        lista.appendChild(li);
      });
    }

    function guardarCarrito() {
      fetch('http://localhost:3000/Guardar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productos: carrito })
      })
      .then(res => res.text())
      .then(msg => {
        alert(msg);
        carrito = [];
        mostrarCarrito();
      })
      .catch(err => {
        console.error(err);
        alert("Error al guardar el carrito");
      });
    }

    function cargarProductos() {
      fetch('http://localhost:3000/CargarTodas', {
        method: 'POST'
      })
      .then(res => res.json())
      .then(productos => {
        const lista = document.getElementById("productos");
        lista.innerHTML = "";
        productos.forEach(p => {
          const li = document.createElement("li");
          li.textContent = `${p.nombre} - $${p.precio}`;
          lista.appendChild(li);
        });
      });
    }
  </script>
</body>
</html>
